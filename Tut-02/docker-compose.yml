services:
  node-app:
    build: ./node-app
    container_name: node-service
    volumes:
      - ./shared:/data
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./shared:/usr/share/nginx/html:ro
    depends_on:
      - node-app
    networks:
      - app-network

networks:
  app-network: